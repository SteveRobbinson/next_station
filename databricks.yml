bundle:
  name: geo-etl-pipeline

artifacts:
  app_wheel:
    type: whl
    path: .
    build: "python -m build --wheel"

variables:
  volume_path:
    description: "Target path for python wheel"
  spark_version:
    default: "4.0_2.13"
  sedona_version:
    default: "1.8.1"
  geotools_version:
    default: "1.8.0-33.1"
  databricks_runtime_version:
    default: "17.3.x-scala2.13"
  sql_warehouse_id:
    description: "warehouse ID for dbt related tasks"

targets:
  prod:
    workspace:
      artifact_path: ${var.volume_path}/${bundle.name}

resources:
  jobs:
    etl_geo_job:
      name: "ETL Geo Job"
      job_clusters:
      - job_cluster_key: "databricks_geo_cluster"
        new_cluster:
          spark_version: ${var.databricks_runtime_version}
          node_type_id: "r5d.large"
          num_workers: 2
          aws_attributes:
            availability: "SPOT_WITH_FALLBACK"
            first_on_demand: 1
          spark_conf:
            "spark.serializer": "org.apache.spark.serializer.KryoSerializer"
            "spark.kryo.registrator": "org.apache.sedona.viz.core.Serde.SedonaVizKryoRegistrator"
            "spark.sql.extensions": "org.apache.sedona.viz.sql.SedonaVizExtensions,org.apache.sedona.sql.SedonaSqlExtensions"
            "spark.kryoserializer.buffer.max": "2047m"
            "spark.sql.sedona.raster.serialization.kryo": "true"
          data_security_mode: "SINGLE_USER"

      tasks:
        ### Railway Stations Pipeline ###
        - task_key: "ingest_railway_stations"
          job_cluster_key: "databricks_geo_cluster"
          python_wheel_task:
            package_name: "next_station"
            entry_point: "ingest_railway_station"
          libraries:
            - whl: ${workspace.artifact_path}

        - task_key: "preprocess_railway_stations"
          job_cluster_key: "databricks_geo_cluster"
          depends_on:
            - task_key: "ingest_railway_stations"
          python_wheel_task:
            package_name: "next_station"
            entry_point: "preprocess_railway_stations"
          libraries:
            - whl: ${workspace.artifact_path}

        - task_key: "railway_stations_silver_A"
          job_cluster_key: "databricks_geo_cluster"
          depends_on:
            - task_key: "preprocess_railway_stations"
          dbt_task:
            project_directory: "./dbt_project"
            warehouse_id: ${var.sql_warehouse_id}
            commands:
              - "dbt deps"
              - "dbt run --select stg_railway_stations"

        - task_key: "railway_stations_silver_B"
          job_cluster_key: "databricks_geo_cluster"
          depends_on:
            - task_key: "railway_stations_silver_A"
          dbt_task:
            project_directory: "./dbt_project"
            warehouse_id: ${var.sql_warehouse_id}
            commands:
              - "dbt run --select int_railway_stations"


        ### Population Grid Pipeline ####
        - task_key: "ingest_population_grid"
          job_cluster_key: "databricks_geo_cluster"
          python_wheel_task:
            package_name: "next_station"
            entry_point: "ingest_population_grid"
          libraries:
            - whl: ${workspace.artifact_path}

        - task_key: "preprocess_population_grid"
          job_cluster_key: "databricks_geo_cluster"
          depends_on:
            - task_key: "ingest_population_grid"
          python_wheel_task:
            package_name: "next_station"
            entry_point: "preprocess_population_grid"
          libraries:
            - whl: ${workspace.artifact_path}
            - maven:
                coordinates: "org.apache.sedona:sedona-spark-shaded-${var.spark_version}:${var.sedona_version}"
            - maven:
                coordinates: "org.datasyslab:geotools-wrapper:${var.geotools_version}"

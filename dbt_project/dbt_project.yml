name: dbt_project

profile: next_station

seed-paths: ["seeds"]
model-paths: ["models"]
macro-paths: ["macros"]
clean-targets:
  - "target"
  - "dbt_packages"

seeds:
  # Builds seeds into '<your_schema_name>_raw'
  dbt_project:
    +schema: raw

models:
  dbt_project:
    +static_analysis: strict
    staging:
      +materialized: view
    marts:
      +materialized: table

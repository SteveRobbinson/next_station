version: 2

models:
  - name: stg_railway_stations
    columns:
      - name: station_id
        tests:
          - unique
          - not_null

      - name: latitude
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: -90
                max_values: 90

      - name: longitude
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: -180
                max_value: 180

      - name: station_type
        tests:
          - accepted_values:
              arguments:
                values: ['node']

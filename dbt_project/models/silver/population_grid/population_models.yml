version: 2

models:
  - name: stg_population_grid
    columns:
      - name: geom_wkb
        tests:
          - not_null

      - name: population_value
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0

  - name: int_population_grid_h3
    columns:
      - name: h3_index
        tests:
          - not_null
          - unique

      - name: total_population
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
